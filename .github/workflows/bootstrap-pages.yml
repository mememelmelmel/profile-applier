name: Bootstrap Pages (run once)

on:
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  bootstrap:
    name: Deploy seed index.json to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:

      - name: Create seed index.json
        run: |
          mkdir Website
          echo '{"name":"Mel Hair Profiles","id":"mememelmelmel.hair-profiles","url":"https://mememelmelmel.github.io/hair-profiles/index.json","author":"mememelmelmel","packages":{}}' > Website/index.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Website

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
